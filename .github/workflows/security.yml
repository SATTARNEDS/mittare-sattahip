name: Security checks

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install application and audit tools
        run: python -m pip install -r requirements.txt pip-audit
      - name: Audit known dependency vulnerabilities
        run: python -m pip_audit -r requirements.txt
      - name: Compile and test
        run: |
          python -m py_compile server.py combined_app.py mittare_site/app.py decrypt_backup.py
          python -m unittest -v test_site_security.py test_admin_workflow.py test_member_workflow.py

