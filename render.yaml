services:
  - type: web
    name: mittare-exam-coach
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --threads 4 --timeout 60 server:app
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_PATH
        value: /tmp/mittare-exam/exam_coach.sqlite3
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: mt4admin
      - key: ADMIN_PASSWORD
        sync: false
